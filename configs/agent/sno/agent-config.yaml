apiVersion: v1beta1
kind: AgentConfig
metadata:
  name: sno
additionalNTPSources:
  - pool.ntp.org
  - pool.ntp.org
rendezvousIP: 10.3.0.107
hosts:
  - hostname: sno
    interfaces:
      - name: enp1s0
        macAddress: 52:54:00:4e:ff:22
    rootDeviceHints:
      deviceName: /dev/sda
    networkConfig:
      interfaces:
        - name: enp1s0
          type: ethernet
          state: up
          mac-address: 52:54:00:4e:ff:22
          ipv4:
            enabled: true
            address:
              - ip: 10.3.0.107
                prefix-length: 24
            dhcp: false
      dns-resolver:
        config:
          server:
            - 10.3.0.1
      routes:
        config:
          - destination: 0.0.0.0/0
            next-hop-address: 10.3.0.1
            next-hop-interface: enp1s0
            table-id: 254
