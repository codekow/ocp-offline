---
# oc-mirror -c ./isc.yaml --workspace file:///${PWD}/scratch/oc-mirror docker://registry:5000 --v2 --image-timeout 60m
kind: ImageSetConfiguration
apiVersion: mirror.openshift.io/v2alpha1
mirror:
  operators:
    - catalog: registry.redhat.io/redhat/redhat-operator-index:v4.20
      targetCatalog: redhat/redhat-operator-index
      targetTag: v4.20
      packages:
        - name: cincinnati-operator
          defaultChannel: v1
          minVersion: 5.0.3
          maxVersion: 5.0.3
        - name: local-storage-operator
          defaultChannel: stable
          minVersion: 4.20.0-202602091941
          maxVersion: 4.20.0-202602091941
        - name: kubevirt-hyperconverged
          defaultChannel: stable
          minVersion: 4.20.7
          maxVersion: 4.20.7
        - name: web-terminal
          defaultChannel: fast
          minVersion: 1.15.0
          maxVersion: 1.15.0
